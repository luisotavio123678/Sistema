<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financeiro | Seu Copo Bar & Chopp</title>

<link rel="stylesheet" href="dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
}

.content{
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1c1c1c;
color:white;
padding:20px;
border-radius:12px;
text-align:center;
}

.card h2{
color:#D4AF37;
margin-bottom:10px;
}

form{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:30px;
}

input,select{
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px;
background:#D4AF37;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#111;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

.entrada{
color:#16a34a;
font-weight:bold;
}

.saida{
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

🍺 Seu Copo

</div>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="produtos.html">Produtos</a></li>
<li><a href="pedidos.html">Pedidos</a></li>
<li><a href="clientes.html">Clientes</a></li>
<li><a href="estoque.html">Estoque</a></li>
<li class="active"><a href="#">Financeiro</a></li>

</ul>

</div>

<div class="content">

<h1>Financeiro</h1>

<div class="cards">

<div class="card">

<h2>Entradas</h2>

<h1 id="entradas">R$ 0,00</h1>

</div>

<div class="card">

<h2>Saídas</h2>

<h1 id="saidas">R$ 0,00</h1>

</div>

<div class="card">

<h2>Saldo</h2>

<h1 id="saldo">R$ 0,00</h1>

</div>

</div>

<form id="financeiroForm">

<select id="tipo">

<option value="Entrada">Entrada</option>

<option value="Saída">Saída</option>

</select>

<input
id="descricao"
placeholder="Descrição"
required>

<input
id="valor"
type="number"
step="0.01"
placeholder="Valor"
required>

<button>

Registrar

</button>

</form>

<table>

<thead>

<tr>

<th>ID</th>

<th>Tipo</th>

<th>Descrição</th>

<th>Valor</th>

<th>Data</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="movimentos">

</tbody>

</table>

</div>

<script>

let id = 1;

let totalEntradas = 0;

let totalSaidas = 0;

const tbody = document.getElementById("movimentos");

document.getElementById("financeiroForm").addEventListener("submit",function(e){

e.preventDefault();

const tipo=document.getElementById("tipo").value;

const descricao=document.getElementById("descricao").value;

const valor=parseFloat(document.getElementById("valor").value);

const data=new Date().toLocaleDateString("pt-BR");

if(tipo==="Entrada"){

totalEntradas+=valor;

}else{

totalSaidas+=valor;

}

atualizarResumo();

const classe=tipo==="Entrada"?"entrada":"saida";

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${id++}</td>

<td class="${classe}">${tipo}</td>

<td>${descricao}</td>

<td>R$ ${valor.toFixed(2)}</td>

<td>${data}</td>

<td>

<button onclick="remover(this,'${tipo}',${valor})">

Excluir

</button>

</td>

`;

tbody.prepend(tr);

this.reset();

});

function atualizarResumo(){

document.getElementById("entradas").innerHTML="R$ "+totalEntradas.toFixed(2);

document.getElementById("saidas").innerHTML="R$ "+totalSaidas.toFixed(2);

document.getElementById("saldo").innerHTML="R$ "+(totalEntradas-totalSaidas).toFixed(2);

}

function remover(botao,tipo,valor){

if(confirm("Excluir movimentação?")){

if(tipo==="Entrada"){

totalEntradas-=valor;

}else{

totalSaidas-=valor;

}

atualizarResumo();

botao.parentElement.parentElement.remove();

}

}

</script>

</body>

</html>
