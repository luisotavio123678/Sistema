<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedidos | Seu Copo Bar & Chopp</title>

<link rel="stylesheet" href="dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
font-family:Arial, Helvetica, sans-serif;
}

.content{
padding:30px;
}

form{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:30px;
}

input,select{

padding:12px;

border:1px solid #ccc;

border-radius:8px;

}

button{

padding:12px;

background:#D4AF37;

border:none;

cursor:pointer;

border-radius:8px;

font-weight:bold;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

table th{

background:#111;

color:white;

padding:12px;

}

table td{

padding:12px;

text-align:center;

border-bottom:1px solid #ddd;

}

.status{

padding:6px 12px;

border-radius:20px;

font-size:13px;

font-weight:bold;

}

.recebido{

background:#2196F3;

color:white;

}

.preparo{

background:orange;

color:white;

}

.pronto{

background:green;

color:white;

}

.entregue{

background:#555;

color:white;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

🍺 Seu Copo

</div>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>

<li><a href="produtos.html">Produtos</a></li>

<li><a href="estoque.html">Estoque</a></li>

<li class="active"><a href="#">Pedidos</a></li>

<li><a href="clientes.html">Clientes</a></li>

<li><a href="financeiro.html">Financeiro</a></li>

</ul>

</div>

<div class="content">

<h1>Controle de Pedidos</h1>

<form id="pedidoForm">

<input
id="mesa"
type="number"
placeholder="Mesa"
required>

<input
id="cliente"
placeholder="Nome do Cliente"
required>

<input
id="produto"
placeholder="Produto"
required>

<input
id="quantidade"
type="number"
value="1"
min="1"
required>

<input
id="valor"
type="number"
step="0.01"
placeholder="Valor Unitário"
required>

<button>

Adicionar Pedido

</button>

</form>

<table>

<thead>

<tr>

<th>Pedido</th>

<th>Mesa</th>

<th>Cliente</th>

<th>Produto</th>

<th>Qtd.</th>

<th>Total</th>

<th>Status</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="pedidos">

</tbody>

</table>

</div>

<script>

let numeroPedido = 1;

const tbody = document.getElementById("pedidos");

document.getElementById("pedidoForm").addEventListener("submit",function(e){

e.preventDefault();

const mesa=document.getElementById("mesa").value;

const cliente=document.getElementById("cliente").value;

const produto=document.getElementById("produto").value;

const quantidade=parseInt(document.getElementById("quantidade").value);

const valor=parseFloat(document.getElementById("valor").value);

const total=(quantidade*valor).toFixed(2);

const tr=document.createElement("tr");

tr.innerHTML=`

<td>#${numeroPedido++}</td>

<td>${mesa}</td>

<td>${cliente}</td>

<td>${produto}</td>

<td>${quantidade}</td>

<td>R$ ${total}</td>

<td>

<span class="status recebido">

Recebido

</span>

</td>

<td>

<button onclick="alterarStatus(this)">Status</button>

<button onclick="imprimirPedido(this)">Imprimir</button>

<button onclick="excluirPedido(this)">Excluir</button>

</td>

`;

tbody.prepend(tr);

this.reset();

});

function alterarStatus(botao){

const status=botao.parentElement.parentElement.querySelector(".status");

if(status.classList.contains("recebido")){

status.className="status preparo";

status.innerHTML="Em Preparo";

}

else if(status.classList.contains("preparo")){

status.className="status pronto";

status.innerHTML="Pronto";

}

else if(status.classList.contains("pronto")){

status.className="status entregue";

status.innerHTML="Entregue";

}

}

function excluirPedido(botao){

if(confirm("Deseja excluir este pedido?")){

botao.parentElement.parentElement.remove();

}

}

function imprimirPedido(botao){

window.print();

}

</script>

</body>

</html>
